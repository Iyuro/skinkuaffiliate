<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Podium Kreator — SKINKU Affiliate</title>
<meta name="description" content="Top kreator affiliate SKINKU berdasarkan GMV dan video terbanyak.">
<style>
:root{
  --pink:#ffb6c8;--pink2:#ff9eb5;--peach:#ffd4c4;--cream:#fff5f0;
  --lavender:#d8c4ff;--gold:#ffd166;--gold2:#f4a72e;--silver:#d9d9e3;--bronze:#e8b894;
  --text:#3a2a35;--text2:#8a7585;--white:#ffffff;
  --shadow:0 8px 24px rgba(255,158,181,0.25);
  --card-bg:rgba(255,255,255,0.72);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(160deg,#fff5f0 0%,#ffe8ee 45%,#f3e6ff 100%);
  min-height:100vh;color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  padding:32px 16px 80px;
  overflow-x:hidden;
}
.header{text-align:center;margin-bottom:8px;animation:fadeDown .6s ease}
.header .logo{font-size:13px;font-weight:800;letter-spacing:.12em;color:var(--pink2);text-transform:uppercase;margin-bottom:6px}
.header h1{font-size:26px;font-weight:800;color:var(--text);margin-bottom:4px}
.header p{font-size:13px;color:var(--text2)}
.last-updated{font-size:11px;color:var(--text2);margin-top:4px;opacity:.8}

.tabs{display:flex;gap:8px;background:rgba(255,255,255,0.6);border-radius:14px;padding:5px;margin:22px 0 10px;box-shadow:0 4px 14px rgba(255,158,181,0.15)}
.tab-btn{border:none;background:none;padding:9px 20px;border-radius:10px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .25s}
.tab-btn.active{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;box-shadow:0 4px 12px rgba(255,158,181,0.4)}

.section{width:100%;max-width:680px;display:none}
.section.active{display:block;animation:fadeIn .4s ease}

/* ===== PODIUM ===== */
.podium-wrap{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin:36px 0 28px;padding:0 8px}
.podium-slot{flex:1;max-width:200px;display:flex;flex-direction:column;align-items:center;animation:popUp .6s ease backwards}
.podium-slot.s2{animation-delay:.1s}
.podium-slot.s1{animation-delay:0s}
.podium-slot.s3{animation-delay:.2s}

.medal{font-size:34px;margin-bottom:6px;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.15))}

.avatar-circle{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:10px;position:relative;box-shadow:0 6px 16px rgba(0,0,0,0.15);border:4px solid #fff}
.s1 .avatar-circle{width:92px;height:92px;font-size:32px;background:linear-gradient(135deg,var(--gold),var(--gold2))}
.s2 .avatar-circle{background:linear-gradient(135deg,#c7c9e8,var(--silver))}
.s3 .avatar-circle{background:linear-gradient(135deg,var(--bronze),#d49a6a)}

.podium-username{font-weight:800;font-size:14px;margin-bottom:2px;text-align:center;word-break:break-all}
.podium-metric-main{font-size:17px;font-weight:800;color:var(--pink2);margin-bottom:2px}
.podium-metric-sub{font-size:11.5px;color:var(--text2);margin-bottom:10px}

.podium-base{width:100%;border-radius:16px 16px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:10px;font-size:28px;font-weight:900;color:#fff;box-shadow:0 -4px 16px rgba(0,0,0,0.08)}
.s1 .podium-base{height:120px;background:linear-gradient(160deg,var(--gold),var(--gold2))}
.s2 .podium-base{height:88px;background:linear-gradient(160deg,#dcdef0,var(--silver))}
.s3 .podium-base{height:64px;background:linear-gradient(160deg,var(--bronze),#d49a6a)}
.podium-wrap{align-items:flex-end}
.podium-slot.s2{order:1}
.podium-slot.s1{order:2}
.podium-slot.s3{order:3}

.empty-podium{text-align:center;padding:50px 20px;color:var(--text2);font-size:14px}

/* ===== FULL LEADERBOARD ===== */
.leaderboard-header{
  display:flex;align-items:center;justify-content:space-between;
  margin:8px 0 14px;
}
.leaderboard-title{font-size:15px;font-weight:800;color:var(--text)}
.leaderboard-count{font-size:12px;color:var(--text2);background:rgba(255,158,181,0.15);padding:4px 10px;border-radius:20px}

.lb-search{
  width:100%;padding:10px 14px;border-radius:12px;border:1.5px solid rgba(255,158,181,0.3);
  background:rgba(255,255,255,0.8);font-size:13px;color:var(--text);outline:none;
  margin-bottom:12px;transition:border .2s;
}
.lb-search:focus{border-color:var(--pink2)}
.lb-search::placeholder{color:var(--text2)}

.lb-list{display:flex;flex-direction:column;gap:8px}

.lb-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card-bg);border-radius:14px;padding:12px 14px;
  box-shadow:0 2px 10px rgba(255,158,181,0.10);
  transition:transform .15s,box-shadow .15s;
  animation:fadeIn .35s ease backwards;
}
.lb-row:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(255,158,181,0.18)}
.lb-row.top1{background:linear-gradient(135deg,rgba(255,209,102,0.22),rgba(244,167,46,0.10));border:1.5px solid rgba(255,209,102,0.5)}
.lb-row.top2{background:linear-gradient(135deg,rgba(200,205,230,0.25),rgba(217,217,227,0.10));border:1.5px solid rgba(200,205,230,0.5)}
.lb-row.top3{background:linear-gradient(135deg,rgba(232,184,148,0.22),rgba(212,154,106,0.10));border:1.5px solid rgba(232,184,148,0.5)}

.lb-rank-badge{
  min-width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;flex-shrink:0;
}
.lb-row.top1 .lb-rank-badge{background:linear-gradient(135deg,var(--gold),var(--gold2));font-size:18px}
.lb-row.top2 .lb-rank-badge{background:linear-gradient(135deg,#c7c9e8,var(--silver));color:var(--text)}
.lb-row.top3 .lb-rank-badge{background:linear-gradient(135deg,var(--bronze),#d49a6a)}
.lb-row:not(.top1):not(.top2):not(.top3) .lb-rank-badge{background:rgba(138,117,133,0.15);color:var(--text2);font-size:13px}

.lb-avatar{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#fff;flex-shrink:0;
  background:linear-gradient(135deg,var(--pink),var(--lavender));
}
.lb-row.top1 .lb-avatar{background:linear-gradient(135deg,var(--gold),var(--gold2))}
.lb-row.top2 .lb-avatar{background:linear-gradient(135deg,#c7c9e8,var(--silver));color:var(--text)}
.lb-row.top3 .lb-avatar{background:linear-gradient(135deg,var(--bronze),#d49a6a)}

.lb-info{flex:1;min-width:0}
.lb-username{font-size:14px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-sub{font-size:11.5px;color:var(--text2);margin-top:2px}

.lb-metric{text-align:right;flex-shrink:0}
.lb-metric-main{font-size:15px;font-weight:800;color:var(--pink2)}
.lb-metric-sub{font-size:11px;color:var(--text2);margin-top:2px}

.lb-empty{text-align:center;padding:30px;color:var(--text2);font-size:13px}

.footer-brand{margin-top:36px;text-align:center;font-size:11.5px;color:var(--text2);opacity:.75}
.footer-brand b{color:var(--pink2)}

.loader{display:flex;justify-content:center;padding:60px 0;gap:8px}
.loader span{width:10px;height:10px;border-radius:50%;background:var(--pink2);animation:bob 1s infinite ease-in-out}
.loader span:nth-child(2){animation-delay:.15s}
.loader span:nth-child(3){animation-delay:.3s}

.stats-strip{
  display:flex;gap:10px;margin-bottom:20px;
}
.stat-pill{
  flex:1;background:var(--card-bg);border-radius:14px;padding:12px 14px;text-align:center;
  box-shadow:0 2px 10px rgba(255,158,181,0.10);
}
.stat-pill-val{font-size:18px;font-weight:800;color:var(--pink2)}
.stat-pill-lbl{font-size:11px;color:var(--text2);margin-top:2px}

/* ===== INTIP BUTTON + REVEAL MODAL ===== */
.lb-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.intip-btn{
  border:none;cursor:pointer;font-size:11px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--lavender),var(--pink2));
  padding:6px 11px;border-radius:20px;white-space:nowrap;
  box-shadow:0 3px 8px rgba(216,196,255,0.4);transition:transform .15s;
}
.intip-btn:hover{transform:translateY(-1px) scale(1.03)}
.intip-btn:active{transform:scale(.96)}
.intip-btn.revealed{background:linear-gradient(135deg,#7ee0a8,#4ec98a);cursor:default}

.reveal-overlay{
  position:fixed;inset:0;background:rgba(58,42,53,0.45);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;
  animation:fadeIn .2s ease;
}
.reveal-overlay.hidden{display:none}
.reveal-card{
  background:linear-gradient(160deg,#fff 0%,#fff5f0 100%);
  border-radius:22px;padding:26px 22px;max-width:340px;width:100%;
  box-shadow:0 20px 50px rgba(58,42,53,0.3);text-align:center;position:relative;
  animation:popUp .35s ease;
}
.reveal-close{
  position:absolute;top:12px;right:14px;border:none;background:none;
  font-size:18px;color:var(--text2);cursor:pointer;line-height:1;
}
.reveal-icon{font-size:38px;margin-bottom:6px}
.reveal-title{font-size:16px;font-weight:800;margin-bottom:4px}
.reveal-sub{font-size:12.5px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.reveal-input{
  width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(255,158,181,0.35);
  background:#fff;font-size:14px;color:var(--text);outline:none;text-align:center;
  margin-bottom:10px;transition:border .2s;
}
.reveal-input:focus{border-color:var(--pink2)}
.reveal-input.shake{animation:shake .4s ease}
.reveal-submit{
  width:100%;border:none;padding:12px;border-radius:12px;font-size:14px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--pink),var(--pink2));cursor:pointer;
  box-shadow:0 6px 16px rgba(255,158,181,0.35);transition:transform .15s,opacity .15s;
}
.reveal-submit:hover{transform:translateY(-1px)}
.reveal-submit:disabled{opacity:.6;cursor:default;transform:none}
.reveal-msg{font-size:12.5px;margin-top:10px;min-height:16px;font-weight:700}
.reveal-msg.err{color:#e0526b}
.reveal-msg.ok{color:#3aa876}

.reveal-success .reveal-icon{animation:bounce .6s ease infinite}
.reveal-username-big{font-size:19px;font-weight:900;color:var(--pink2);margin:8px 0 4px;word-break:break-all}
.reveal-congrats{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:6px}

.confetti-piece{
  position:fixed;top:-10px;border-radius:2px;pointer-events:none;z-index:1001;
  animation:confettiFall linear forwards;
}

@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popUp{from{opacity:0;transform:translateY(24px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes confettiFall{
  from{transform:translateY(0) rotate(0deg);opacity:1}
  to{transform:translateY(100vh) rotate(540deg);opacity:0}
}

@media (max-width:480px){
  .header h1{font-size:21px}
  .avatar-circle{width:58px;height:58px;font-size:20px}
  .s1 .avatar-circle{width:76px;height:76px;font-size:26px;margin-top:4px}
  .podium-metric-main{font-size:14px}
  .podium-username{font-size:12.5px}
  .s1 .podium-base{height:100px}
  .s2 .podium-base{height:74px}
  .s3 .podium-base{height:54px}
  .podium-wrap{gap:6px}
  .stats-strip{gap:7px}
  .tab-btn{padding:9px 14px;font-size:12px}
  .intip-btn{font-size:10px;padding:5px 9px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">✨ SKINKU Affiliate</div>
  <h1>🏆 Podium Kreator</h1>
  <p>Kreator dengan performa terbaik bulan ini</p>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tabGmv" onclick="switchTab('gmv')">💰 Top GMV</button>
  <button class="tab-btn" id="tabVideo" onclick="switchTab('video')">🎬 Top Video</button>
</div>

<div class="section active" id="sectionGmv">
  <div id="podiumGmv"><div class="loader"><span></span><span></span><span></span></div></div>
  <div id="statsGmv" style="display:none" class="stats-strip"></div>
  <div id="leaderboardGmv" style="display:none">
    <div class="leaderboard-header">
      <div class="leaderboard-title">📋 Semua Kreator — Rank GMV</div>
      <div class="leaderboard-count" id="lbCountGmv"></div>
    </div>
    <input class="lb-search" id="searchGmv" placeholder="🔍 Cari username..." oninput="filterList('gmv')">
    <div class="lb-list" id="lbListGmv"></div>
  </div>
</div>

<div class="section" id="sectionVideo">
  <div id="podiumVideo"><div class="loader"><span></span><span></span><span></span></div></div>
  <div id="statsVideo" style="display:none" class="stats-strip"></div>
  <div id="leaderboardVideo" style="display:none">
    <div class="leaderboard-header">
      <div class="leaderboard-title">📋 Semua Kreator — Rank Video</div>
      <div class="leaderboard-count" id="lbCountVideo"></div>
    </div>
    <input class="lb-search" id="searchVideo" placeholder="🔍 Cari username..." oninput="filterList('video')">
    <div class="lb-list" id="lbListVideo"></div>
  </div>
</div>

<div class="footer-brand">Dibuat dengan 💖 oleh <b>SKINKU</b> — Affiliate Analyzer</div>

<div class="reveal-overlay hidden" id="revealOverlay" onclick="if(event.target===this)closeReveal()">
  <div class="reveal-card" id="revealCard">
    <button class="reveal-close" onclick="closeReveal()">✕</button>
    <div id="revealBody"></div>
  </div>
</div>

<script>
let allGmvData = [], allVideoData = [];
let revealedMap = {}; // key: "gmv-12" / "video-4" -> username asli yang udah terbukti
let currentReveal = null; // {rank, type}

function switchTab(tab){
  document.getElementById('tabGmv').classList.toggle('active', tab==='gmv');
  document.getElementById('tabVideo').classList.toggle('active', tab==='video');
  document.getElementById('sectionGmv').classList.toggle('active', tab==='gmv');
  document.getElementById('sectionVideo').classList.toggle('active', tab==='video');
}

function initials(username){
  const clean = username.replace(/\*/g,'');
  return (clean.slice(0,2) || '??').toUpperCase();
}

function rowClass(rank){
  if(rank===1) return 'top1';
  if(rank===2) return 'top2';
  if(rank===3) return 'top3';
  return '';
}

function rankBadge(rank){
  if(rank===1) return '🥇';
  if(rank===2) return '🥈';
  if(rank===3) return '🥉';
  return rank;
}

/* -------- PODIUM TOP 3 -------- */
function renderPodium(containerId, data, metricLabelFn, subLabelFn){
  const el = document.getElementById(containerId);
  if(!data || !data.length){
    el.innerHTML = '<div class="empty-podium">Belum ada data buat ditampilkan.<br>Cek lagi nanti ya! 🌸</div>';
    return;
  }
  const slots = [{rank:2,cls:'s2'},{rank:1,cls:'s1'},{rank:3,cls:'s3'}];
  let html = '<div class="podium-wrap">';
  slots.forEach(({rank,cls})=>{
    const item = data[rank-1];
    if(!item){ html += `<div class="podium-slot ${cls}"></div>`; return; }
    const medal = rank===1?'👑':rank===2?'🥈':'🥉';
    html += `<div class="podium-slot ${cls}">
      ${rank===1?'<div style="font-size:13px;font-weight:800;color:var(--gold2);margin-bottom:4px">JUARA 1</div>':''}
      <div class="medal">${medal}</div>
      <div class="avatar-circle">${initials(item.username)}</div>
      <div class="podium-username">@${item.username}</div>
      <div class="podium-metric-main">${metricLabelFn(item)}</div>
      <div class="podium-metric-sub">${subLabelFn(item)}</div>
      <div class="podium-base">${rank}</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

/* -------- STATS STRIP -------- */
function renderStats(id, data, type){
  const el = document.getElementById(id);
  if(!data || !data.length){ el.style.display='none'; return; }
  const totalCreators = data.length;
  let html = '';
  if(type === 'gmv'){
    const totalGmv = data.reduce((s,r)=>s+(r.gmv||0),0);
    const totalVideo = data.reduce((s,r)=>s+(r.video||0),0);
    const avgGmv = totalCreators ? Math.round(totalGmv/totalCreators) : 0;
    html = `
      <div class="stat-pill"><div class="stat-pill-val">${totalCreators}</div><div class="stat-pill-lbl">Total Kreator</div></div>
      <div class="stat-pill"><div class="stat-pill-val">${fmtRp(totalGmv)}</div><div class="stat-pill-lbl">Total GMV</div></div>
      <div class="stat-pill"><div class="stat-pill-val">${fmtRp(avgGmv)}</div><div class="stat-pill-lbl">Rata-rata GMV</div></div>
      <div class="stat-pill"><div class="stat-pill-val">${totalVideo}</div><div class="stat-pill-lbl">Total Video</div></div>`;
  } else {
    const totalVideo = data.reduce((s,r)=>s+(r.video||0),0);
    const totalGmv = data.reduce((s,r)=>s+(r.gmv||0),0);
    const avgVideo = totalCreators ? (totalVideo/totalCreators).toFixed(1) : 0;
    html = `
      <div class="stat-pill"><div class="stat-pill-val">${totalCreators}</div><div class="stat-pill-lbl">Total Kreator</div></div>
      <div class="stat-pill"><div class="stat-pill-val">${totalVideo}</div><div class="stat-pill-lbl">Total Video</div></div>
      <div class="stat-pill"><div class="stat-pill-val">${avgVideo}</div><div class="stat-pill-lbl">Rata-rata Video</div></div>
      <div class="stat-pill"><div class="stat-pill-val">${fmtRp(totalGmv)}</div><div class="stat-pill-lbl">Total GMV</div></div>`;
  }
  el.innerHTML = html;
  el.style.display = 'flex';
}

/* -------- FULL LEADERBOARD -------- */
// Rank yang sudah tampil di podium (2-1-3) di atas, jadi list di bawah
// defaultnya langsung mulai dari rank 4 biar nggak dobel.
const PODIUM_RANKS_SHOWN = 3;

function buildLbRow(item, type){
  const cls = rowClass(item.rank);
  const badge = rankBadge(item.rank);
  let metricMain, metricSub;
  if(type==='gmv'){
    metricMain = item.gmvFormatted;
    metricSub = `${item.video} video`;
  } else {
    metricMain = `${item.video} video`;
    metricSub = item.gmvFormatted;
  }
  const revealed = revealedMap[type+'-'+item.rank];
  const usernameHtml = revealed ? `@${revealed}` : `@${item.username}`;
  const intipBtn = revealed
    ? `<button class="intip-btn revealed" disabled>✅ Terbuka</button>`
    : `<button class="intip-btn" onclick="openReveal(${item.rank},'${type}')">🔓 Intip</button>`;
  return `<div class="lb-row ${cls}" style="animation-delay:${Math.min(item.rank*0.03,0.6)}s">
    <div class="lb-rank-badge">${badge}</div>
    <div class="lb-avatar">${initials(item.username)}</div>
    <div class="lb-info">
      <div class="lb-username">${usernameHtml}</div>
      <div class="lb-sub">${type==='gmv'?`Sampel: ${item.sampelTerkirim||0} pcs`:`GMV: ${item.gmvFormatted}`}</div>
    </div>
    <div class="lb-metric">
      <div class="lb-metric-main">${metricMain}</div>
      <div class="lb-metric-sub">${metricSub}</div>
    </div>
    <div class="lb-actions">${intipBtn}</div>
  </div>`;
}

function renderLeaderboard(type, data){
  const lbEl = document.getElementById('leaderboard'+cap(type));
  const listEl = document.getElementById('lbList'+cap(type));
  const countEl = document.getElementById('lbCount'+cap(type));
  if(!data || !data.length){ lbEl.style.display='none'; return; }
  lbEl.style.display = 'block';
  // Default: sembunyiin rank 1-3 karena udah ditampilin di podium di atas.
  const rest = data.filter(r => r.rank > PODIUM_RANKS_SHOWN);
  countEl.textContent = rest.length + ' kreator';
  listEl.innerHTML = rest.length
    ? rest.map(item => buildLbRow(item, type)).join('')
    : '<div class="lb-empty">Semua kreator udah tampil di podium ya 🏆</div>';
}

function filterList(type){
  const q = document.getElementById('search'+cap(type)).value.toLowerCase().trim();
  const source = type==='gmv' ? allGmvData : allVideoData;
  // Pas nggak lagi nyari, tetep sembunyiin rank 1-3 (udah ada di podium).
  const base = q ? source : source.filter(r => r.rank > PODIUM_RANKS_SHOWN);
  const filtered = q ? base.filter(r => r.username.toLowerCase().includes(q)) : base;
  const listEl = document.getElementById('lbList'+cap(type));
  const countEl = document.getElementById('lbCount'+cap(type));
  if(!filtered.length){
    listEl.innerHTML = '<div class="lb-empty">Tidak ada kreator dengan nama tersebut 🌸</div>';
    countEl.textContent = '0 kreator';
    return;
  }
  countEl.textContent = filtered.length + ' kreator';
  listEl.innerHTML = filtered.map(item => buildLbRow(item, type)).join('');
}

function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function fmtRp(v){
  if(!v||v===0) return 'Rp 0';
  if(v>=1e9) return 'Rp '+(v/1e9).toFixed(1)+'M';
  if(v>=1e6) return 'Rp '+(v/1e6).toFixed(1)+'jt';
  if(v>=1e3) return 'Rp '+(v/1e3).toFixed(0)+'rb';
  return 'Rp '+v;
}

/* -------- INTIP / REVEAL MODAL -------- */
function openReveal(rank, type){
  currentReveal = { rank, type };
  const source = type==='gmv' ? allGmvData : allVideoData;
  const item = source.find(r => r.rank === rank);
  const overlay = document.getElementById('revealOverlay');
  const card = document.getElementById('revealCard');
  card.className = 'reveal-card';
  document.getElementById('revealBody').innerHTML = `
    <div class="reveal-icon">🔒</div>
    <div class="reveal-title">Intip Username</div>
    <div class="reveal-sub">Ini akun kamu? Ketik username TikTok kamu sendiri (lengkap, tanpa @) sebagai kata sandi buat buka namanya di sini.</div>
    <input type="text" class="reveal-input" id="revealInput" placeholder="Ketik username kamu..." autocomplete="off" autocapitalize="off">
    <button class="reveal-submit" id="revealSubmitBtn" onclick="submitReveal()">✨ Buka Sekarang</button>
    <div class="reveal-msg" id="revealMsg"></div>
  `;
  overlay.classList.remove('hidden');
  const input = document.getElementById('revealInput');
  setTimeout(()=>input.focus(), 50);
  input.addEventListener('keydown', e => { if(e.key==='Enter') submitReveal(); });
}

function closeReveal(){
  document.getElementById('revealOverlay').classList.add('hidden');
  currentReveal = null;
}

async function submitReveal(){
  if(!currentReveal) return;
  const input = document.getElementById('revealInput');
  const msgEl = document.getElementById('revealMsg');
  const btn = document.getElementById('revealSubmitBtn');
  const guess = input.value.trim();
  if(!guess){
    msgEl.textContent = 'Isi dulu username-nya ya 🌸';
    msgEl.className = 'reveal-msg err';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Mengecek...';
  msgEl.textContent = '';
  msgEl.className = 'reveal-msg';
  try{
    const res = await fetch('/api/podium-reveal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rank: currentReveal.rank, type: currentReveal.type, guess })
    });
    const data = await res.json();

    if(data.success){
      revealedMap[currentReveal.type + '-' + currentReveal.rank] = data.username;
      showRevealSuccess(data);
      // refresh list biar badge "Terbuka" & username asli langsung kepasang di baris
      if(currentReveal.type === 'gmv') renderLeaderboard('gmv', allGmvData);
      else renderLeaderboard('video', allVideoData);
      const q = document.getElementById('search'+cap(currentReveal.type)).value.trim();
      if(q) filterList(currentReveal.type);
    } else {
      btn.disabled = false;
      btn.textContent = '✨ Buka Sekarang';
      msgEl.textContent = data.message || 'Password salah, coba lagi ya!';
      msgEl.className = 'reveal-msg err';
      input.classList.remove('shake');
      void input.offsetWidth;
      input.classList.add('shake');
      input.focus();
    }
  }catch(err){
    btn.disabled = false;
    btn.textContent = '✨ Buka Sekarang';
    msgEl.textContent = 'Gagal menghubungi server. Coba lagi ya.';
    msgEl.className = 'reveal-msg err';
  }
}

function showRevealSuccess(data){
  const card = document.getElementById('revealCard');
  card.className = 'reveal-card reveal-success';
  document.getElementById('revealBody').innerHTML = `
    <div class="reveal-icon">🎉</div>
    <div class="reveal-title">Selamat! Terverifikasi</div>
    <div class="reveal-username-big">@${data.username}</div>
    <div class="reveal-congrats">${data.message || 'Selamat, kamu berhasil buka namamu sendiri! 🎊'}</div>
    <div class="reveal-sub" style="margin-bottom:0">${data.gmvFormatted ? `GMV: <b>${data.gmvFormatted}</b> &nbsp;•&nbsp; Video: <b>${data.video}</b>` : ''}</div>
  `;
  launchConfetti();
}

function launchConfetti(){
  const colors = ['#ffb6c8','#ff9eb5','#ffd166','#f4a72e','#d8c4ff','#a8e6cf'];
  const count = 60;
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random()*6;
    el.style.left = Math.random()*100 + 'vw';
    el.style.width = size + 'px';
    el.style.height = (size*0.4) + 'px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2 + Math.random()*1.5) + 's';
    el.style.animationDelay = (Math.random()*0.4) + 's';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 4200);
  }
}

/* -------- LOAD -------- */
async function loadPodium(){
  try{
    const res = await fetch('/api/podium');
    if(!res.ok) throw new Error('Gagal ambil data');
    const data = await res.json();

    allGmvData   = data.allGmv   || data.topGmv   || [];
    allVideoData = data.allVideo || data.topVideo || [];

    renderPodium('podiumGmv', data.topGmv,
      item => item.gmvFormatted,
      item => `${item.video} video`);

    renderPodium('podiumVideo', data.topVideo,
      item => item.video + ' video',
      item => item.gmvFormatted);

    renderStats('statsGmv', allGmvData, 'gmv');
    renderStats('statsVideo', allVideoData, 'video');

    renderLeaderboard('gmv', allGmvData);
    renderLeaderboard('video', allVideoData);

    if(data.updatedAt){
      const d = new Date(data.updatedAt);
      document.getElementById('lastUpdated').textContent = 'Update terakhir: ' + d.toLocaleString('id-ID',{dateStyle:'medium',timeStyle:'short'});
    }
  }catch(err){
    document.getElementById('podiumGmv').innerHTML  = '<div class="empty-podium">⚠️ Gagal memuat data. Coba refresh halaman ini.</div>';
    document.getElementById('podiumVideo').innerHTML = '<div class="empty-podium">⚠️ Gagal memuat data. Coba refresh halaman ini.</div>';
  }
}

loadPodium();
</script>
